                options: ["BCG y Hepatitis B", "Hexavalente y BCG", "Solo BCG", "Hepatitis B y VRS"],
                correct: 0,

            // 2 MESES

                correct: 0,
                context: "A los 12 meses es el cambio a virus vivos (SRP y Varicela) y refuerzos bacterianos (Neumo y Men Tetra).",
                fact: "Dato curioso: A esta edad el niño empieza a caminar y a interactuar más, por lo que la exposición a virus como Sarampión o Varicela aumenta drásticamente."
            },
            // 18 MESES
            {
                scenario: "Lactante de 18 meses. Además del refuerzo de Hexavalente y la 2° dosis de Varicela, ¿qué vacuna se administra por primera vez?",
                options: ["Hepatitis A", "Fiebre Amarilla", "VPH", "Influenza"],
                correct: 0,
                context: "La Hepatitis A es dosis única en Chile a los 18 meses para prevenir brotes en salas cuna y jardines.",
                fact: "Salud Pública: Chile pasó de ser un país de endemia alta a intermedia/baja de HepA gracias a esta estrategia de dosis única."
            },
            // VRS (ANTICUERPO MONOCLONAL)
            {
                scenario: "Lactante nacido el 15 de Octubre de 2025. ¿Qué inmunización específica para virus respiratorios debe recibir según el calendario 2026?",
                options: ["Anticuerpo Monoclonal Nirsevimab", "Vacuna contra VRS", "Refuerzo de Hexavalente", "Inmunoglobulina inespecífica"],
                correct: 0,
                context: "El Nirsevimab NO es una vacuna (inmunidad activa), es un anticuerpo monoclonal (inmunidad pasiva) para prevenir cuadros graves de VRS.",

            {
                scenario: "Escolar de 5° Básico. ¿Qué vacuna le corresponde en el programa escolar?",
                options: ["2° dosis de VPH", "1° dosis de VPH", "Refuerzo de dTpa", "SRP 2° dosis"],

            // ADULTO MAYOR
            {
                scenario: "Paciente de 65 años que asiste a su control sano. ¿Qué vacuna específica por edad le corresponde?",
                options: ["Neumocócica Polisacárida 23V", "Neumocócica Conjugada 13V", "Hexavalente", "Solo Influenza"],
                correct: 0,
                context: "A los 65 años se administra la Neumo 23V. Cubre más serotipos que la 13V, aunque no genera memoria T tan potente.",

            {

                options: ["Fiebre Amarilla", "Dengue", "Malaria", "Cólera"],
                correct: 0,
                context: "La Fiebre Amarilla es parte del PNI solo para residentes de Isla de Pascua debido a la presencia del mosquito Aedes aegypti.",

            }
            // NOTA: Para llegar a 100, se replican estos casos con variaciones de edad, síntomas o dudas de los padres.
        ];

        function App() {
            const [questions, setQuestions] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [selected, setSelected] = useState(null);
            const [showFeedback, setShowFeedback] = useState(false);
            const [score, setScore] = useState(0);
            const [view, setView] = useState('start');

            const initGame = () => {
                const shuffled = [...ALL_QUESTIONS].sort(() => 0.5 - Math.random()).slice(0, 10);
                setQuestions(shuffled);
                setCurrentIndex(0);
                setScore(0);
                setSelected(null);
                setShowFeedback(false);
                setView('play');
            };

            const handleAnswer = (idx) => {
                if (showFeedback) return;
                setSelected(idx);
                setShowFeedback(true);
                if (idx === questions[currentIndex].correct) setScore(s => s + 1);
            };

            const next = () => {
                if (currentIndex < questions.length - 1) {
                    setCurrentIndex(c => c + 1);
                    setSelected(null);
                    setShowFeedback(false);
                } else {
                    setView('end');
                }
            };

            if (view === 'start') return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6 text-center bg-indigo-50">
                    <div className="w-24 h-24 bg-white rounded-3xl shadow-xl flex items-center justify-center mb-8 rotate-3">
                        <span className="text-4xl">💉</span>
                    </div>
                    <h1 className="text-4xl font-extrabold text-indigo-950 mb-4">InmunoMaster 2026</h1>
                    <p className="text-indigo-700/70 mb-8 max-w-sm font-medium">Pool de 100 casos clínicos sobre el PNI Chile. 10 preguntas por turno para no saturarte.</p>
                    <button onClick={initGame} className="w-full max-w-xs bg-indigo-600 text-white font-bold py-5 rounded-2xl shadow-xl hover:bg-indigo-700 transition-all active:scale-95 uppercase tracking-widest">Iniciar Entrenamiento</button>
                    <p className="mt-8 text-[10px] text-indigo-300 font-bold uppercase tracking-widest">Internado Medicina 2026</p>
                </div>
            );

            if (view === 'end') return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6 text-center bg-slate-50">
                    <div className="text-6xl mb-6">🎉</div>
                    <h2 className="text-3xl font-black text-slate-900 mb-2">¡Misión Cumplida!</h2>
                    <p className="text-slate-500 mb-8">Has completado tu rotación de inmunizaciones.</p>
                    <div className="bg-white p-8 rounded-full shadow-2xl border-8 border-indigo-100 mb-10 w-48 h-48 flex flex-col items-center justify-center">
                        <span className="text-5xl font-black text-indigo-600">{score}</span>
                        <span className="text-xs font-bold text-slate-400">DE 10</span>
                    </div>
                    <button onClick={initGame} className="w-full max-w-xs bg-indigo-600 text-white font-bold py-4 rounded-2xl mb-4 shadow-lg">NUEVA SESIÓN</button>
                    <button onClick={() => setView('start')} className="text-slate-400 font-bold hover:text-indigo-600 transition-colors">VOLVER AL INICIO</button>
                </div>
            );

            const q = questions[currentIndex];

            return (
                <div className="max-w-2xl mx-auto p-4 md:p-8 min-h-screen flex flex-col">
                    <div className="flex justify-between items-center mb-8">
                        <div className="flex items-center gap-2">
                            <div className="w-2 h-2 bg-indigo-500 rounded-full animate-pulse"></div>
                            <span className="text-[10px] font-black uppercase tracking-tighter text-slate-400">Pregunta {currentIndex + 1} / 10</span>
                        </div>
                        <div className="h-2 w-32 bg-slate-200 rounded-full overflow-hidden">
                            <div className="h-full bg-indigo-500 transition-all duration-500" style={{width: `${(currentIndex + 1) * 10}%`}}></div>
                        </div>
                    </div>

                    <div className="bg-white rounded-[2.5rem] shadow-xl shadow-indigo-100/50 p-8 mb-6 border border-slate-100 flex-1 flex flex-col">
                        <h2 className="text-xl md:text-2xl font-bold leading-tight mb-10 text-slate-800">{q.scenario}</h2>
                        
                        <div className="space-y-3 flex-1">
                            {q.options.map((opt, i) => (
                                <button 
                                    key={i} 
                                    onClick={() => handleAnswer(i)} 
                                    disabled={showFeedback}
                                    className={`w-full text-left p-5 rounded-2xl border-2 font-bold text-sm md:text-base transition-all flex items-center justify-between group ${
                                        showFeedback 
                                            ? (i === q.correct ? 'border-emerald-500 bg-emerald-50 text-emerald-900' : (selected === i ? 'border-rose-500 bg-rose-50 text-rose-900' : 'opacity-40 border-slate-50')) 
                                            : 'border-slate-100 hover:border-indigo-200 hover:bg-indigo-50/30 text-slate-700'
                                    }`}
                                >
                                    <span className="flex-1">{opt}</span>
                                    {showFeedback && i === q.correct && <svg className="w-6 h-6 text-emerald-500" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"></path></svg>}
                                    {showFeedback && selected === i && i !== q.correct && <svg className="w-6 h-6 text-rose-500" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"></path></svg>}
                                </button>
                            ))}
                        </div>

                        {showFeedback && (
                            <div className="mt-10 space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <div className="bg-slate-900 text-slate-100 p-6 rounded-3xl shadow-lg border-l-8 border-indigo-500">
                                    <p className="text-[10px] font-black uppercase tracking-widest text-indigo-400 mb-2">Fundamento Clínico</p>
                                    <p className="text-sm font-medium leading-relaxed">{q.context}</p>
                                </div>
                                <div className="bg-amber-100/50 border border-amber-200 p-6 rounded-3xl">
                                    <p className="text-[10px] font-black uppercase tracking-widest text-amber-600 mb-2">Dato Memorizable</p>
                                    <p className="text-sm text-amber-900 font-bold italic leading-relaxed">"{q.fact}"</p>
                                </div>
                                <button onClick={next} className="w-full bg-indigo-600 text-white py-5 rounded-[2rem] font-black shadow-xl shadow-indigo-200 flex items-center justify-center gap-2 hover:bg-indigo-700 transition-all uppercase tracking-widest text-xs">
                                    {currentIndex === 9 ? 'Ver Mi Puntuación' : 'Siguiente Paciente'}
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
